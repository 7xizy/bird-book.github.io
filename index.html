<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦜 鳥類圖鑑｜完整功能版</title>
  <!-- exifr 完整版，支援 RAW 格式 -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif; background:#f7f3eb; color:#3e3a34; height:100vh; display:flex; flex-direction:column; overflow:hidden; user-select:none; }
    :root {
      --surface:#fff; --bg:#f7f3eb; --border:#e0d9cd; --accent:#5a8a6e; --accent-light:#e8f2ea;
      --danger:#b85450; --shadow:0 2px 8px rgba(0,0,0,0.06); --topbar-h:56px;
    }
    .topbar { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:10; }
    .logo { font-weight:700; font-size:1.2rem; color:var(--accent); display:flex; align-items:center; gap:4px; }
    .search-box { flex:1; max-width:520px; position:relative; display:flex; align-items:center; }
    .search-box input { width:100%; padding:8px 12px 8px 36px; border:2px solid var(--border); border-radius:40px; font-size:0.9rem; background:var(--bg); }
    .search-box .icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#999; }
    .search-box .date-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--surface); border:2px solid var(--border); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; z-index:2; }
    .btn { padding:6px 14px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.85rem; display:flex; align-items:center; gap:4px; white-space:nowrap; transition:0.2s; }
    .btn:hover { background:var(--bg); }
    .btn.drive { background:#1a73e8; color:#fff; border-color:#1a73e8; }
    .main { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px 8px; flex-shrink:0; }
    .sidebar h4 { font-size:0.7rem; text-transform:uppercase; color:#999; margin:12px 8px 4px; }
    .cat-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; margin:2px 0; transition:0.2s; }
    .cat-item.active { background:var(--accent-light); font-weight:700; }
    .cat-item .count { margin-left:auto; background:#eee; padding:2px 8px; border-radius:20px; font-size:0.75rem; }
    .cat-item .del-cat { display:none; margin-left:4px; color:var(--danger); cursor:pointer; }
    .cat-item:hover .del-cat { display:inline; }
    .content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .toolbar { padding:8px 16px; display:flex; gap:8px; align-items:center; background:var(--bg); flex-wrap:wrap; }
    .photo-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; align-content:start; }
    .card { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:0.2s; position:relative; border:3px solid transparent; }
    .card.selected { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-light); }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.1); }
    .card .thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:#ddd; display:flex; align-items:center; justify-content:center; font-size:2rem; position:relative; }
    .card .thumb img { width:100%; height:100%; object-fit:cover; }
    .card .raw-badge { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.7); color:#ffcc00; font-size:0.6rem; padding:2px 6px; border-radius:10px; }
    .card .info { padding:8px 10px; }
    .card .title { font-weight:600; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card .meta { font-size:0.7rem; color:#888; margin-top:2px; }
    .card .del-btn { position:absolute; top:6px; right:6px; background:rgba(255,255,255,0.9); border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; color:var(--danger); font-weight:bold; z-index:2; }
    .card:hover .del-btn { display:flex; }
    .detail-panel { width:360px; background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; transition:0.3s; }
    .detail-panel.hidden { width:0; overflow:hidden; border:none; }
    .detail-header { padding:12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
    .detail-header input { flex:1; padding:6px 10px; border:2px solid var(--border); border-radius:6px; }
    .detail-img { width:100%; aspect-ratio:4/3; object-fit:contain; background:#111; }
    .detail-actions { display:flex; gap:8px; margin:8px 12px; flex-wrap:wrap; }
    .detail-actions a, .detail-actions button { flex:1; text-align:center; padding:6px; border-radius:20px; border:2px solid var(--accent); color:var(--accent); background:var(--surface); cursor:pointer; font-weight:600; font-size:0.8rem; text-decoration:none; white-space:nowrap; }
    .detail-actions a:hover, .detail-actions button:hover { background:var(--accent); color:#fff; }
    .detail-section { padding:12px; border-bottom:1px solid #eee; }
    .exif-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.85rem; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:999; }
    .modal-box { background:#fff; padding:20px; border-radius:16px; width:90%; max-width:460px; }
    .modal-box input, .modal-box select { width:100%; padding:8px; margin:4px 0; border:2px solid #ddd; border-radius:8px; }
    .date-popup { position:absolute; top:56px; right:0; background:#fff; border:2px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); z-index:50; display:none; }
    .date-popup input { margin:4px; padding:6px; border:2px solid var(--border); border-radius:8px; }
    .multi-actions { margin-left:auto; display:flex; gap:6px; align-items:center; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">🦜 鳥類圖鑑</div>
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="名稱/相機/鏡頭 或 年份(2024) 月份(2024-03) 區間">
    <span class="date-btn" id="dateBtn" title="日期區間選擇">📅</span>
    <div class="date-popup" id="datePopup">
      <label>開始日期</label>
      <input type="date" id="dateStart">
      <label>結束日期</label>
      <input type="date" id="dateEnd">
      <div style="display:flex; gap:6px; margin-top:8px;">
        <button class="btn" onclick="applyDateRange()">套用</button>
        <button class="btn" onclick="clearDateRange()">清除</button>
      </div>
    </div>
  </div>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📁 上傳</button>
  <input type="file" id="fileInput" multiple accept="image/*,.arw,.cr2,.cr3,.nef,.dng,.orf,.rw2,.pef,.raf,.srw,.heic,.tiff,.tif" hidden>
  <button class="btn drive" onclick="openDriveSettings()">🔗 Google Drive</button>
  <button class="btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <h4>📂 分類</h4>
    <div class="cat-item active" data-cat="all">📷 全部照片 <span class="count" id="countAll">0</span></div>
    <div class="cat-item" data-cat="uncategorized">❓ 未分類 <span class="count" id="countUncat">0</span></div>
    <div id="customCats"></div>
    <button class="btn" style="width:100%; margin-top:6px;" onclick="addCategory()">＋ 新增分類</button>
    <h4>📸 相機</h4>
    <div id="cameraList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('camera')">＋ 新增相機條件</button>
    <h4>🔭 鏡頭</h4>
    <div id="lensList"></div>
    <button class="btn" style="width:100%;" onclick="addFilter('lens')">＋ 新增鏡頭條件</button>
  </aside>

  <div class="content">
    <div class="toolbar">
      <select id="sortSelect" onchange="renderGrid()">
        <option value="date-desc">最新優先</option>
        <option value="date-asc">最舊優先</option>
        <option value="name">名稱排序</option>
      </select>
      <span style="font-size:0.8rem; color:#888;">💡 拖曳照片到分類，或網格內移動</span>
      <div class="multi-actions" id="multiActions" style="display:none;">
        <span id="selectedCount">已選0張</span>
        <button class="btn" onclick="batchMoveCategory()">📂 批次移動</button>
        <button class="btn" onclick="copySelectedLinks()">📋 複製連結</button>
        <button class="btn" onclick="clearSelection()">取消選取</button>
      </div>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <aside class="detail-panel hidden" id="detailPanel">
    <div class="detail-header">
      <input type="text" id="detailName" placeholder="照片名稱">
      <button class="btn" onclick="renamePhoto()">💾 儲存</button>
      <button class="btn" onclick="closeDetail()">✕</button>
    </div>
    <img class="detail-img" id="detailImg" src="" alt="">
    <div class="detail-actions">
      <a id="originalView" target="_blank">🔍 查看原始照片</a>
      <a id="originalDownload" download>⬇️ 下載原始照片</a>
      <button onclick="copyImageToClipboard()" id="copyImgBtn">📋 複製圖片</button>
    </div>
    <div class="detail-section">
      <select id="detailCat" onchange="changeCategory()"><option value="uncategorized">未分類</option></select>
      <button class="btn" style="color:var(--danger); margin-top:8px;" onclick="deletePhoto()">🗑️ 刪除照片 (僅本地)</button>
    </div>
    <div class="detail-section" id="exifInfo">點擊照片查看 EXIF</div>
  </aside>
</div>

<!-- Drive 設定 (API Key) -->
<div class="modal" id="driveModal" style="display:none;">
  <div class="modal-box">
    <h3>🔗 從 Google Drive 載入</h3>
    <label>資料夾 ID</label>
    <input type="text" id="folderIdInput" placeholder="從資料夾網址複製">
    <label>API Key</label>
    <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
    <button class="btn" style="background:var(--accent); color:#fff; width:100%; margin:8px 0;" onclick="loadFromDrive()">載入照片</button>
    <button class="btn" onclick="document.getElementById('driveModal').style.display='none'">取消</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'birdGuide_v7';
  let state = {
    photos: [],
    customCategories: [],
    cameraFilters: [],
    lensFilters: [],
    activeCat: 'all',
    activePhotoId: null,
    drive: { folderId:'', apiKey:'' },
    selectedIds: new Set()
  };

  const localFileStore = new Map(); // id -> { blobUrl, fileName } for local uploads

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      photosMeta: state.photos.map(p => ({
        id:p.id, name:p.name, category:p.category, exif:p.exif, rawFormat:p.rawFormat,
        dateAdded:p.dateAdded, thumbUrl:(p.thumbUrl && !p.thumbUrl.startsWith('blob:'))?p.thumbUrl:null,
        fileName:p.fileName, fileSize:p.fileSize, isRaw:p.isRaw,
        driveFileId:p.driveFileId || null
      })),
      customCategories: state.customCategories,
      cameraFilters: state.cameraFilters,
      lensFilters: state.lensFilters,
      drive: state.drive
    }));
  }

  function load() {
    let s = localStorage.getItem(STORAGE_KEY);
    if(s) {
      let d = JSON.parse(s);
      state.customCategories = d.customCategories || [];
      state.cameraFilters = d.cameraFilters || [];
      state.lensFilters = d.lensFilters || [];
      state.drive = d.drive || {folderId:'', apiKey:''};
      state.photos = (d.photosMeta||[]).map(p => ({...p, fileRef:null, thumbUrl:p.thumbUrl||null}));
    }
  }

  function genId() { return 'p_'+Date.now()+'_'+Math.random().toString(36); }

  async function readExif(file) {
    try {
      return await exifr.parse(file, {
        pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime',
              'ISO','DateTimeOriginal','CreateDate','ImageWidth','ImageHeight'],
        reviveValues:true
      });
    } catch(e) { return null; }
  }

  function formatShutterSpeed(sec) {
    if(!sec && sec!==0) return '';
    let s = parseFloat(sec);
    if(isNaN(s)) return sec+'s';
    if(s >= 1) return s + ' 秒';
    let denom = Math.round(1/s);
    if(Math.abs(s - 1/denom) < 0.001) return `1/${denom} 秒`;
    return s.toFixed(4).replace(/0+$/,'') + ' 秒';
  }

  function getRawFormat(fn) {
    let ext = fn.split('.').pop().toLowerCase();
    let map = { arw:'SONY ARW', cr2:'Canon CR2', cr3:'Canon CR3', nef:'Nikon NEF',
                dng:'Adobe DNG', orf:'Olympus ORF', rw2:'Panasonic RW2',
                pef:'Pentax PEF', raf:'Fujifilm RAF', srw:'Samsung SRW' };
    return map[ext] || null;
  }

  async function extractRawThumb(file) {
    try {
      let t = await exifr.thumbnail(file);
      if(t) { let b = new Blob([t],{type:'image/jpeg'}); return URL.createObjectURL(b); }
    } catch(e){}
    return null;
  }

  async function handleUpload(files) {
    for(let f of files) {
      let id = genId();
      let raw = getRawFormat(f.name), isRaw = !!raw;
      let exif = await readExif(f);
      let thumb = isRaw ? await extractRawThumb(f) : (f.type.startsWith('image/') ? URL.createObjectURL(f) : null);
      let photo = { id, name:f.name, category:'uncategorized', thumbUrl:thumb,
        fileRef:f, exif, rawFormat:raw, isRaw, dateAdded:new Date().toISOString(),
        fileName:f.name, fileSize:f.size, driveFileId:null };
      state.photos.push(photo);
      localFileStore.set(id, { blobUrl:URL.createObjectURL(f), fileName:f.name });
    }
    save(); renderAll();
  }

  async function loadFromDrive() {
    let fid = document.getElementById('folderIdInput').value.trim();
    let key = document.getElementById('apiKeyInput').value.trim();
    if(!fid||!key) return alert('請輸入資料夾 ID 與 API Key');
    state.drive = { folderId:fid, apiKey:key };
    save();
    document.getElementById('driveModal').style.display='none';
    state.photos = state.photos.filter(p => !p.driveFileId);
    try {
      let params = new URLSearchParams({ q:`'${fid}' in parents`, key, fields:'files(id,name,mimeType,size,thumbnailLink,webContentLink,createdTime)', pageSize:100 });
      let res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`);
      if(!res.ok) throw new Error(res.status);
      let data = await res.json();
      if(!data.files?.length) { alert('無圖片'); renderAll(); return; }
      let imgs = data.files.filter(f=>f.mimeType?.startsWith('image/') || f.name.match(/\.(arw|cr2|cr3|nef|dng|orf|rw2|pef|raf|srw|jpg|jpeg|png|heic|tiff|tif)$/i));
      let added = new Set();
      for(let f of imgs) {
        if(added.has(f.id)) continue; added.add(f.id);
        let id = genId(), raw = getRawFormat(f.name), thumb = f.thumbnailLink||null;
        let exif = null;
        if(f.webContentLink) try {
          exif = await exifr.parse(f.webContentLink, { pick:['Make','Model','LensModel','FocalLength','FNumber','ExposureTime','ISO','DateTimeOriginal','CreateDate'], reviveValues:true });
        } catch(e){}
        let photo = { id, name:f.name, category:'uncategorized', thumbUrl:thumb, fileRef:null,
          exif, rawFormat:raw, isRaw:!!raw, dateAdded:f.createdTime||new Date().toISOString(),
          fileName:f.name, fileSize:f.size||0, driveFileId:f.id };
        state.photos.push(photo);
      }
      save(); renderAll();
    } catch(e){ alert('載入失敗: '+e.message); }
  }

  function getFilteredPhotos() {
    let q = document.getElementById('searchInput').value.trim();
    let arr = [...state.photos];
    if(state.activeCat === 'uncategorized') arr = arr.filter(p=>p.category==='uncategorized');
    else if(state.activeCat.startsWith('camera:')) arr = arr.filter(p=>p.exif?.Model===state.activeCat.replace('camera:',''));
    else if(state.activeCat.startsWith('lens:')) arr = arr.filter(p=>p.exif?.LensModel===state.activeCat.replace('lens:',''));
    else if(state.activeCat !== 'all' && !state.activeCat.startsWith('camera:') && !state.activeCat.startsWith('lens:'))
      arr = arr.filter(p=>p.category===state.activeCat);
    if(q) {
      let range = q.match(/(\d{4}-\d{2}-\d{2})\s*(至|\.\.)\s*(\d{4}-\d{2}-\d{2})/);
      if(range) {
        let s = new Date(range[1]), e=new Date(range[3]);
        if(!isNaN(s)&&!isNaN(e)) arr = arr.filter(p=>{ let d=getPhotoDate(p); return d>=s&&d<=e; });
      } else if(/^\d{4}$/.test(q)) {
        let y = parseInt(q);
        arr = arr.filter(p=>getPhotoDate(p).getFullYear()===y);
      } else if(/^(\d{4})-(\d{2})$/.test(q)) {
        let m = q.match(/^(\d{4})-(\d{2})$/), year=parseInt(m[1]), month=parseInt(m[2]);
        arr = arr.filter(p=>{ let d=getPhotoDate(p); return d.getFullYear()===year && d.getMonth()+1===month; });
      } else {
        let lq = q.toLowerCase();
        arr = arr.filter(p=>p.name.toLowerCase().includes(lq)||(p.exif?.Model||'').toLowerCase().includes(lq)||(p.exif?.LensModel||'').toLowerCase().includes(lq));
      }
    }
    let sort = document.getElementById('sortSelect').value;
    if(sort==='date-desc') arr.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
    else if(sort==='date-asc') arr.sort((a,b)=>new Date(a.dateAdded)-new Date(b.dateAdded));
    else if(sort==='name') arr.sort((a,b)=>a.name.localeCompare(b.name));
    return arr;
  }

  function getPhotoDate(p) {
    if(p.exif?.DateTimeOriginal) return new Date(p.exif.DateTimeOriginal);
    if(p.exif?.CreateDate) return new Date(p.exif.CreateDate);
    return new Date(p.dateAdded);
  }

  function renderGrid() {
    let grid = document.getElementById('photoGrid');
    grid.innerHTML = '';
    let photos = getFilteredPhotos();
    photos.forEach((p,idx)=>{
      let card = document.createElement('div');
      card.className = 'card' + (state.selectedIds.has(p.id)?' selected':'');
      card.draggable = true;
      card.dataset.id = p.id;
      card.dataset.index = idx;
      card.addEventListener('click',(e)=>{
        if(e.ctrlKey || e.metaKey) {
          e.preventDefault();
          if(state.selectedIds.has(p.id)) state.selectedIds.delete(p.id); else state.selectedIds.add(p.id);
          updateSelectionUI();
          card.classList.toggle('selected');
        } else {
          if(!e.target.closest('.del-btn')) openDetail(p.id);
        }
      });
      card.addEventListener('dragstart', e=>{
        e.dataTransfer.setData('text/plain', p.id);
        card.classList.add('dragging');
      });
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      card.addEventListener('dragover', e=>e.preventDefault());
      card.addEventListener('drop', e=>{
        e.preventDefault();
        let fromId = e.dataTransfer.getData('text/plain');
        let toId = p.id;
        if(fromId && toId && fromId!==toId) movePhoto(fromId, toId);
      });
      let thumbHTML = p.thumbUrl ? `<img src="${p.thumbUrl}" alt="">` : (p.isRaw?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#f0e9d8;"><span style="font-size:2rem;">📷</span><span style="font-size:0.7rem;">${p.rawFormat||'RAW'}</span></div>`:'<span>🦜</span>');
      card.innerHTML = `
        <div class="thumb">${thumbHTML}${p.isRaw?`<span class="raw-badge">${p.rawFormat||'RAW'}</span>`:''}</div>
        <div class="info"><div class="title">${p.name}</div><div class="meta">${p.exif?.Model||''} ${p.exif?.FocalLength?p.exif.FocalLength+'mm':''}</div></div>
        <div class="del-btn" onclick="event.stopPropagation(); window.deletePhotoById('${p.id}')">✕</div>`;
      grid.appendChild(card);
    });
  }

  function updateSelectionUI() {
    let c = state.selectedIds.size;
    document.getElementById('multiActions').style.display = c>0?'flex':'none';
    document.getElementById('selectedCount').textContent = `已選${c}張`;
  }

  window.clearSelection = ()=>{
    state.selectedIds.clear();
    updateSelectionUI();
    renderGrid();
  };

  window.copySelectedLinks = ()=>{
    let links = [];
    state.selectedIds.forEach(id=>{
      let p = state.photos.find(ph=>ph.id===id);
      if(p) {
        if(p.fileRef) links.push(URL.createObjectURL(p.fileRef));
        else if(p.driveFileId) links.push(`https://drive.google.com/file/d/${p.driveFileId}/view`);
      }
    });
    if(links.length) navigator.clipboard.writeText(links.join('\n')).then(()=>alert('已複製連結'));
  };

  window.batchMoveCategory = ()=>{
    let cat = prompt('輸入分類名稱（或留空為未分類）：');
    let target = cat?.trim() || 'uncategorized';
    state.selectedIds.forEach(id=>{
      let p = state.photos.find(ph=>ph.id===id);
      if(p) p.category = target;
    });
    state.selectedIds.clear();
    updateSelectionUI();
    save(); renderAll();
  };

  function movePhoto(fromId, toId) {
    let fromIdx = state.photos.findIndex(p=>p.id===fromId);
    let toIdx = state.photos.findIndex(p=>p.id===toId);
    if(fromIdx!==-1 && toIdx!==-1) {
      state.photos.splice(toIdx, 0, state.photos.splice(fromIdx,1)[0]);
      save(); renderGrid();
    }
  }

  function openDetail(id) {
    state.activePhotoId = id;
    let p = state.photos.find(ph=>ph.id===id);
    if(!p) return;
    document.getElementById('detailPanel').classList.remove('hidden');
    document.getElementById('detailName').value = p.name;
    let img = document.getElementById('detailImg');
    img.src = p.thumbUrl || '';
    let view = document.getElementById('originalView');
    let down = document.getElementById('originalDownload');
    if(p.fileRef) {
      let url = URL.createObjectURL(p.fileRef);
      view.href = url; down.href = url; down.download = p.fileName; 
    } else if(p.driveFileId && state.drive.apiKey) {
      let url = `https://www.googleapis.com/drive/v3/files/${p.driveFileId}?alt=media&key=${state.drive.apiKey}`;
      view.href = url; down.href = url; down.download = p.fileName;
    } else if(p.driveFileId) {
      let url = `https://drive.google.com/file/d/${p.driveFileId}/view`;
      view.href = url; down.href = '#';
    } else {
      view.removeAttribute('href'); down.removeAttribute('href');
    }
    let sel = document.getElementById('detailCat');
    sel.innerHTML = '<option value="uncategorized">未分類</option>'+state.customCategories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
    sel.value = p.category;
    let exifDiv = document.getElementById('exifInfo');
    if(p.exif) {
      let rows = [];
      if(p.exif.Make) rows.push(`<div class="exif-row"><span>製造商</span><span>${p.exif.Make}</span></div>`);
      if(p.exif.Model) rows.push(`<div class="exif-row"><span>相機型號</span><span>${p.exif.Model}</span></div>`);
      if(p.exif.LensModel) rows.push(`<div class="exif-row"><span>鏡頭</span><span>${p.exif.LensModel}</span></div>`);
      if(p.exif.FocalLength) rows.push(`<div class="exif-row"><span>焦距</span><span>${p.exif.FocalLength}mm</span></div>`);
      if(p.exif.FNumber) rows.push(`<div class="exif-row"><span>光圈</span><span>f/${p.exif.FNumber}</span></div>`);
      if(p.exif.ExposureTime!==undefined) rows.push(`<div class="exif-row"><span>快門</span><span>${formatShutterSpeed(p.exif.ExposureTime)}</span></div>`);
      if(p.exif.ISO) rows.push(`<div class="exif-row"><span>ISO</span><span>${p.exif.ISO}</span></div>`);
      if(p.exif.DateTimeOriginal||p.exif.CreateDate) rows.push(`<div class="exif-row"><span>拍攝日期</span><span>${p.exif.DateTimeOriginal||p.exif.CreateDate}</span></div>`);
      exifDiv.innerHTML = rows.join('') || '無 EXIF 資料';
    } else exifDiv.innerHTML = '無 EXIF 資料';
  }

  window.copyImageToClipboard = async ()=>{
    let p = state.photos.find(ph=>ph.id===state.activePhotoId);
    if(!p) return;
    try {
      let imgBlob;
      if(p.fileRef) imgBlob = p.fileRef;
      else if(p.driveFileId && state.drive.apiKey) {
        let url = `https://www.googleapis.com/drive/v3/files/${p.driveFileId}?alt=media&key=${state.drive.apiKey}`;
        let res = await fetch(url); imgBlob = await res.blob();
      }
      if(imgBlob) {
        await navigator.clipboard.write([new ClipboardItem({[imgBlob.type]:imgBlob})]);
        alert('已複製圖片到剪貼簿');
      }
    } catch(e) { alert('複製失敗'); }
  };

  window.deletePhotoById = (id)=>{
    state.photos = state.photos.filter(p=>p.id!==id);
    state.selectedIds.delete(id);
    localFileStore.delete(id);
    if(state.activePhotoId===id) closeDetail();
    save(); renderAll();
  };

  function closeDetail() {
    document.getElementById('detailPanel').classList.add('hidden');
    state.activePhotoId = null;
  }

  window.renamePhoto = ()=>{
    let p = state.photos.find(ph=>ph.id===state.activePhotoId);
    if(p) { p.name = document.getElementById('detailName').value.trim() || p.name; save(); renderAll(); }
  };

  window.changeCategory = ()=>{
    let p = state.photos.find(ph=>ph.id===state.activePhotoId);
    if(p) { p.category = document.getElementById('detailCat').value; save(); renderAll(); }
  };

  window.deletePhoto = ()=>{
    let p = state.photos.find(ph=>ph.id===state.activePhotoId);
    if(p) { state.photos = state.photos.filter(ph=>ph.id!==p.id); state.selectedIds.delete(p.id); closeDetail(); save(); renderAll(); }
  };

  // 側邊欄渲染
  function renderSidebar() {
    document.getElementById('countAll').textContent = state.photos.length;
    document.getElementById('countUncat').textContent = state.photos.filter(p=>p.category==='uncategorized').length;
    let customDiv = document.getElementById('customCats');
    customDiv.innerHTML = state.customCategories.map(cat => {
      let cnt = state.photos.filter(p=>p.category===cat.name).length;
      return `<div class="cat-item" data-cat="${cat.name}"><span>🐦 ${cat.name}</span><span class="count">${cnt}</span><span class="del-cat" onclick="event.stopPropagation(); window.deleteCategory('${cat.name}')">✕</span></div>`;
    }).join('');
    let camDiv = document.getElementById('cameraList');
    let cams = [...new Set(state.photos.map(p=>p.exif?.Model).filter(Boolean))];
    state.cameraFilters.forEach(f=>{if(!cams.includes(f)) cams.push(f)});
    camDiv.innerHTML = cams.map(m=>`<div class="cat-item" data-cat="camera:${m}">📷 ${m}</div>`).join('');
    let lensDiv = document.getElementById('lensList');
    let lenses = [...new Set(state.photos.map(p=>p.exif?.LensModel).filter(Boolean))];
    state.lensFilters.forEach(f=>{if(!lenses.includes(f)) lenses.push(f)});
    lensDiv.innerHTML = lenses.map(l=>`<div class="cat-item" data-cat="lens:${l}">🔭 ${l}</div>`).join('');
    document.querySelectorAll('.sidebar .cat-item').forEach(el=>{
      el.onclick = (e)=>{
        if(e.target.closest('.del-cat')) return;
        state.activeCat = el.dataset.cat;
        document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
        el.classList.add('active');
        renderGrid();
      };
      el.addEventListener('dragover', e=>e.preventDefault());
      el.addEventListener('drop', e=>{
        e.preventDefault();
        let fromId = e.dataTransfer.getData('text/plain');
        let toCat = el.dataset.cat;
        if(fromId && toCat && !toCat.startsWith('camera:')&&!toCat.startsWith('lens:')){
          let p = state.photos.find(ph=>ph.id===fromId);
          if(p) { p.category = toCat; save(); renderAll(); }
        }
      });
    });
  }

  window.deleteCategory = (name)=>{
    state.customCategories = state.customCategories.filter(c=>c.name!==name);
    state.photos.forEach(p=>{if(p.category===name)p.category='uncategorized'});
    save(); renderAll();
  };
  window.addCategory = ()=>{
    let n = prompt('分類名稱：');
    if(n && !state.customCategories.find(c=>c.name===n)) { state.customCategories.push({name:n}); save(); renderAll(); }
  };
  window.addFilter = (type)=>{
    let n = prompt(`輸入${type==='camera'?'相機':'鏡頭'}型號：`);
    if(n) { if(type==='camera') state.cameraFilters.push(n); else state.lensFilters.push(n); save(); renderAll(); }
  };

  // 日期區間
  document.getElementById('dateBtn').onclick = (e)=>{ e.stopPropagation(); document.getElementById('datePopup').style.display='block'; };
  window.applyDateRange = ()=>{
    let s = document.getElementById('dateStart').value, e = document.getElementById('dateEnd').value;
    if(s&&e) document.getElementById('searchInput').value = s+' 至 '+e;
    else if(s) document.getElementById('searchInput').value = s;
    else if(e) document.getElementById('searchInput').value = e;
    document.getElementById('datePopup').style.display='none';
    renderGrid();
  };
  window.clearDateRange = ()=>{
    document.getElementById('dateStart').value=''; document.getElementById('dateEnd').value='';
    document.getElementById('searchInput').value=''; document.getElementById('datePopup').style.display='none';
    renderGrid();
  };
  document.addEventListener('click',(e)=>{
    if(!e.target.closest('.date-popup') && !e.target.closest('.date-btn'))
      document.getElementById('datePopup').style.display='none';
  });

  // Drive
  window.openDriveSettings = ()=>{
    document.getElementById('folderIdInput').value = state.drive.folderId||'';
    document.getElementById('apiKeyInput').value = state.drive.apiKey||'';
    document.getElementById('driveModal').style.display='flex';
  };
  window.loadFromDrive = loadFromDrive;

  // 檔案上傳
  document.getElementById('fileInput').onchange = (e)=>{
    if(e.target.files.length) { handleUpload(e.target.files); e.target.value=''; }
  };
  document.getElementById('searchInput').oninput = renderGrid;

  // 拖放上傳
  window.addEventListener('dragover', e=>e.preventDefault());
  window.addEventListener('drop', e=>{
    e.preventDefault();
    if(e.dataTransfer.files.length) handleUpload(e.dataTransfer.files);
  });

  function renderAll() { renderSidebar(); renderGrid(); updateSelectionUI(); }
  // 初始化
  load();
  renderAll();
})();
</script>
</body>
</html>
