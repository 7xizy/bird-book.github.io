<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦜 鸟类图鉴 - 生态摄影管理中心</title>
    <!-- exifr 库 -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
    <!-- Google API 库 -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        /* 样式保持不变，新增小部分 */
        :root {
            --bg: #f7f3eb;
            --surface: #ffffff;
            --text: #3e3a34;
            --text-secondary: #6b655c;
            --text-muted: #9a9489;
            --border: #e0d9cd;
            --accent: #5a8a6e;
            --accent-hover: #4a7359;
            --accent-light: #e8f2ea;
            --accent-warm: #c0854a;
            --danger: #b85450;
            --danger-light: #fce8e6;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition: 0.2s;
            --sidebar-width: 280px;
            --detail-width: 380px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
        .topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0; }
        .search-wrap { flex:1; max-width:400px; position:relative; }
        .search-wrap input { width:100%; padding:9px 16px 9px 40px; border:2px solid var(--border); border-radius:50px; background:var(--bg); }
        .search-wrap .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); }
        .btn { padding:8px 16px; border-radius:50px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-weight:600; display:flex; align-items:center; gap:6px; }
        .btn:hover { background:var(--bg); border-color:var(--accent); }
        .btn-drive { background:#1a73e8; color:#fff; border-color:#1a73e8; }
        .main-layout { display:flex; flex:1; overflow:hidden; }
        .sidebar { width:var(--sidebar-width); background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:12px; }
        .category-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; }
        .category-item.active { background:var(--accent-light); font-weight:700; }
        .category-item .delete-btn { margin-left:auto; display:none; cursor:pointer; padding:2px 6px; border-radius:50%; background:var(--danger-light); color:var(--danger); }
        .category-item:hover .delete-btn { display:block; }
        .content-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .photo-grid { flex:1; overflow-y:auto; padding:10px 16px; display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:14px; }
        .photo-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-sm); cursor:grab; display:flex; flex-direction:column; position:relative; }
        .photo-card .card-thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:var(--border); }
        .photo-card .card-body { padding:8px 12px; }
        .photo-card .card-title { font-weight:700; font-size:0.9rem; }
        .photo-card .delete-card-btn { position:absolute; top:4px; right:4px; background:var(--danger-light); color:var(--danger); border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; cursor:pointer; }
        .photo-card:hover .delete-card-btn { display:flex; }
        .detail-panel { width:var(--detail-width); background:var(--surface); border-left:1px solid var(--border); overflow-y:auto; }
        .detail-panel.hidden { width:0; overflow:hidden; }
        .original-img-link { display:block; margin-top:8px; color:var(--accent); cursor:pointer; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2000; }
        .modal { background:var(--surface); padding:24px; border-radius:16px; width:90%; max-width:500px; }
        /* 其他样式与之前相似，省略以节省篇幅 */
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="topbar">
        <div class="logo">🦜 鸟类图鉴</div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜索名称/相机/镜头/日期区间 2024-01..2024-03" />
        </div>
        <button class="btn" onclick="document.getElementById('file-input').click()">📁 上传</button>
        <input type="file" id="file-input" multiple accept="image/*,.arw,.cr2,.cr3,.nef,.dng,.orf,.rw2,.pef,.raf,.srw,.heic,.tiff,.tif" />
        <button class="btn btn-drive" id="btn-google-drive">🔗 连接Google Drive</button>
        <button class="btn" onclick="toggleSidebar()">☰</button>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <aside class="sidebar" id="sidebar">
            <!-- 动态生成分类 -->
            <div id="sidebar-categories"></div>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <!-- 视图切换、排序等（省略） -->
            </div>
            <div class="photo-grid" id="photo-grid"></div>
        </main>

        <aside class="detail-panel hidden" id="detail-panel">
            <div class="detail-header">
                <input id="detail-name-input" style="flex:1;border:2px solid var(--border);padding:4px 8px;border-radius:4px;" />
                <button onclick="renamePhoto()">保存名称</button>
                <button class="btn-close" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-image" id="detail-image"></div>
            <a class="original-img-link" id="original-img-link" target="_blank">查看原始照片</a>
            <div class="detail-section">
                <select id="detail-classify-select" onchange="updatePhotoCategory()"></select>
                <button onclick="deleteCurrentPhoto()" style="color:var(--danger)">🗑️ 删除照片</button>
            </div>
            <div class="detail-section" id="exif-container"></div>
        </aside>
    </div>

    <!-- Google Drive 设置弹窗 -->
    <div class="modal-overlay" id="drive-modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Google Drive 设置</h3>
            <label>OAuth 2.0 客户端 ID</label>
            <input type="text" id="drive-client-id" placeholder="xxxxx.apps.googleusercontent.com" />
            <label>文件夹 ID（可选）</label>
            <input type="text" id="drive-folder-id" placeholder="从文件夹网址复制..." />
            <button onclick="loginGoogleDrive()">🔐 登录并授权</button>
            <button onclick="closeDriveModal()">取消</button>
            <p id="drive-status"></p>
        </div>
    </div>

    <script>
        (function() {
            // 全局状态
            const state = {
                photos: [],
                customCategories: [],
                cameraFilters: [],    // 用户自定义的相机筛选
                lensFilters: [],      // 用户自定义的镜头筛选
                activeCategory: 'all',
                activePhotoId: null,
                viewMode: 'grid',
                sortMode: 'date-desc',
                searchQuery: '',
                google: {
                    clientId: '',
                    accessToken: null,
                    folderId: null,
                }
            };

            // ... (loadState, saveState 函数与之前类似，增加 camera/lens filters)

            // ============ Google OAuth 驱动 ============
            function showDriveModal() {
                document.getElementById('drive-modal-overlay').style.display = 'flex';
                document.getElementById('drive-client-id').value = state.google.clientId || '';
                document.getElementById('drive-folder-id').value = state.google.folderId || '';
            }

            function closeDriveModal() {
                document.getElementById('drive-modal-overlay').style.display = 'none';
            }

            function loginGoogleDrive() {
                const cid = document.getElementById('drive-client-id').value.trim();
                const fid = document.getElementById('drive-folder-id').value.trim();
                if (!cid) { alert('请输入 OAuth 2.0 客户端 ID'); return; }
                state.google.clientId = cid;
                state.google.folderId = fid || '';
                // 加载 Google Identity Services
                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.onload = initGoogleAuth;
                document.head.appendChild(script);
                closeDriveModal();
            }

            function initGoogleAuth() {
                google.accounts.id.initialize({
                    client_id: state.google.clientId,
                    callback: handleCredentialResponse,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                });
                google.accounts.id.prompt(); // 显示 One Tap
            }

            function handleCredentialResponse(response) {
                state.google.accessToken = response.credential;
                document.getElementById('btn-google-drive').textContent = '✅ 已授权 Drive';
                showToast('Google Drive 授权成功！现在可以上传与同步');
                // 如果指定了文件夹 ID，可尝试列出文件
                if (state.google.folderId) {
                    loadFilesFromDriveFolder();
                }
            }

            async function loadFilesFromDriveFolder() {
                // 使用 access token 调用 Drive API 列举文件
                const url = `https://www.googleapis.com/drive/v3/files?q='${state.google.folderId}'+in+parents&fields=files(id,name,mimeType,thumbnailLink,webContentLink,createdTime,imageMediaMetadata)&access_token=${state.google.accessToken}`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    // 处理并添加到 state.photos（与之前类似，但使用 token）
                    // ... 省略具体实现，参考 loadFromDrive 但使用 access_token
                } catch(e) { console.error(e); }
            }

            // ============ 重命名 ============
            async function renamePhoto() {
                const photo = state.photos.find(p => p.id === state.activePhotoId);
                if (!photo) return;
                const newName = document.getElementById('detail-name-input').value.trim();
                if (!newName) return;
                photo.name = newName;
                // 同步到 Drive（如果有 token 且文件来自 Drive）
                if (state.google.accessToken && photo.driveFileId) {
                    try {
                        await fetch(`https://www.googleapis.com/drive/v3/files/${photo.driveFileId}`, {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `Bearer ${state.google.accessToken}`,
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ name: newName }),
                        });
                        showToast('已同步名称到 Google Drive');
                    } catch (e) { showToast('Drive 重命名失败: '+e.message); }
                }
                renderAll();
            }

            // ============ 上传本地文件（同时上传到 Drive） ============
            async function handleFiles(files) {
                const fileArray = Array.from(files);
                for (const file of fileArray) {
                    const id = generateId();
                    const rawFormat = getRawFormat(file.name);
                    const exif = await readExifFromFile(file);
                    // 生成缩略图
                    let thumbnailUrl = null;
                    if (file.type.startsWith('image/')) thumbnailUrl = URL.createObjectURL(file);
                    const photo = {
                        id, name: file.name, category: 'uncategorized', thumbnailUrl,
                        fileRef: file, exif, rawFormat, dateAdded: new Date().toISOString(),
                        driveFileId: null,
                    };
                    // 如果已授权 Drive，上传文件
                    if (state.google.accessToken && state.google.folderId) {
                        try {
                            const metadata = {
                                name: file.name,
                                parents: [state.google.folderId],
                            };
                            const form = new FormData();
                            form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
                            form.append('file', file);
                            const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${state.google.accessToken}` },
                                body: form,
                            });
                            const driveFile = await res.json();
                            photo.driveFileId = driveFile.id;
                            showToast('已上传至 Google Drive');
                        } catch(e) { console.warn('Drive 上传失败', e); }
                    }
                    state.photos.push(photo);
                }
                saveState();
                renderAll();
            }

            // ============ 删除照片（仅本地） ============
            function deletePhoto(photoId) {
                state.photos = state.photos.filter(p => p.id !== photoId);
                if (state.activePhotoId === photoId) closeDetail();
                renderAll();
                showToast('照片已从图鉴中移除');
            }

            // ============ 搜索增强（支持日期区间） ============
            function parseDateRange(text) {
                const rangeRegex = /(\d{4}[-/]\d{1,2}[-/]\d{1,2})\s*(至|to|\.\.)\s*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i;
                const match = text.match(rangeRegex);
                if (match) {
                    const start = new Date(match[1].replace(/-/g,'/'));
                    const end = new Date(match[3].replace(/-/g,'/'));
                    if (!isNaN(start) && !isNaN(end)) {
                        return { start, end };
                    }
                }
                return null;
            }

            function getFilteredPhotos() {
                let photos = [...state.photos];
                // 分类筛选...
                // ...（省略，与之前相同）...

                if (state.searchQuery) {
                    const q = state.searchQuery;
                    const dateRange = parseDateRange(q);
                    photos = photos.filter(p => {
                        // 文本搜索
                        const textMatch = p.name.toLowerCase().includes(q.toLowerCase()) ||
                            (p.exif?.Model || '').toLowerCase().includes(q.toLowerCase()) ||
                            (p.exif?.LensModel || '').toLowerCase().includes(q.toLowerCase());
                        // 日期区间搜索
                        if (dateRange) {
                            const photoDate = getPhotoDate(p);
                            if (photoDate >= dateRange.start && photoDate <= dateRange.end) return true;
                        }
                        return dateRange ? false : textMatch;
                    });
                }
                // 排序...
                return photos;
            }

            // ============ 侧边栏动态生成（含拖拽排序、删除） ============
            function renderSidebar() {
                const container = document.getElementById('sidebar-categories');
                container.innerHTML = '';
                // 全部照片
                container.appendChild(createCategoryItem('all', '📷 全部照片', state.photos.length));
                // 自定义分类（可拖拽排序）
                const customDiv = document.createElement('div');
                customDiv.className = 'draggable-categories';
                state.customCategories.forEach((cat, idx) => {
                    const item = createCategoryItem(cat.name, cat.emoji+' '+cat.name, countByCat(cat.name));
                    item.classList.add('draggable-cat');
                    item.draggable = true;
                    item.dataset.catIndex = idx;
                    item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', idx); });
                    item.addEventListener('dragover', (e) => e.preventDefault());
                    item.addEventListener('drop', (e) => {
                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                        e.target.closest('.category-item').appendChild(document.querySelector(`[data-cat-index="${fromIdx}"]`));
                        // 交换数组
                        const temp = state.customCategories[fromIdx];
                        const toIdx = parseInt(e.target.closest('.category-item').dataset.catIndex);
                        state.customCategories.splice(fromIdx, 1);
                        state.customCategories.splice(toIdx, 0, temp);
                        renderAll();
                    });
                    // 删除按钮
                    const delBtn = document.createElement('span');
                    delBtn.className = 'delete-btn';
                    delBtn.textContent = '×';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteCategory(cat.name);
                    };
                    item.appendChild(delBtn);
                    customDiv.appendChild(item);
                });
                container.appendChild(customDiv);
                // 相机筛选
                // ... 类似，使用 state.cameraFilters
                // 镜头筛选
                // ... 使用 state.lensFilters
            }

            // ============ 原始照片查看 ============
            function updateDetailPanel() {
                const photo = state.photos.find(p => p.id === state.activePhotoId);
                if (!photo) return;
                document.getElementById('detail-name-input').value = photo.name;
                // 原始照片链接
                const origLink = document.getElementById('original-img-link');
                if (photo.fileRef) {
                    origLink.href = URL.createObjectURL(photo.fileRef);
                    origLink.style.display = 'block';
                } else if (photo.driveFileId && state.google.accessToken) {
                    origLink.href = `https://www.googleapis.com/drive/v3/files/${photo.driveFileId}?alt=media&access_token=${state.google.accessToken}`;
                    origLink.style.display = 'block';
                } else {
                    origLink.style.display = 'none';
                }
                // 渲染 EXIF...
            }

            // 初始化代码
            function init() {
                loadState();
                document.getElementById('btn-google-drive').addEventListener('click', showDriveModal);
                // ... 其他事件绑定
                renderAll();
            }
            init();
        })();
    </script>
</body>
</html>
